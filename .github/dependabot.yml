version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "eslint-*"
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "eslint-*"
        patterns:
          - "*"
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
